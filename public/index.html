<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Book</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7fb;
        --surface: #ffffff;
        --surface-alt: #f8fafc;
        --border: #d7deea;
        --text: #1f2937;
        --muted: #6b7280;
        --primary: #2563eb;
        --primary-dark: #1d4ed8;
        --danger: #dc2626;
        --danger-dark: #b91c1c;
        --shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 100%);
        color: var(--text);
      }

      .page {
        width: min(960px, calc(100% - 2rem));
        margin: 2rem auto;
      }

      .shell {
        background: var(--surface);
        border: 1px solid rgba(215, 222, 234, 0.85);
        border-radius: 20px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .hero {
        padding: 2rem;
        border-bottom: 1px solid var(--border);
        background: linear-gradient(135deg, rgba(37, 99, 235, 0.08), rgba(255, 255, 255, 0.96));
      }

      .hero h1 {
        margin: 0 0 0.5rem;
        font-size: clamp(1.8rem, 3vw, 2.4rem);
      }

      .hero p {
        margin: 0;
        color: var(--muted);
        max-width: 42rem;
      }

      .content {
        display: grid;
        gap: 1.5rem;
        padding: 1.5rem;
      }

      .panel {
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--surface-alt);
        padding: 1.25rem;
      }

      .panel h2 {
        margin: 0 0 1rem;
        font-size: 1.1rem;
      }

      form {
        display: grid;
        gap: 0.9rem;
      }

      .form-grid {
        display: grid;
        gap: 0.9rem;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      label {
        display: grid;
        gap: 0.35rem;
        font-size: 0.92rem;
        color: var(--muted);
      }

      input {
        width: 100%;
        padding: 0.8rem 0.9rem;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: #fff;
        font: inherit;
        color: var(--text);
      }

      input:focus {
        outline: 2px solid rgba(37, 99, 235, 0.2);
        border-color: var(--primary);
      }

      .actions,
      .row-actions {
        display: flex;
        gap: 0.65rem;
        flex-wrap: wrap;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 0.78rem 1rem;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        transition: transform 120ms ease, background 120ms ease, opacity 120ms ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button:disabled {
        opacity: 0.65;
        cursor: wait;
        transform: none;
      }

      .primary {
        background: var(--primary);
        color: white;
      }

      .primary:hover {
        background: var(--primary-dark);
      }

      .secondary {
        background: #e5e7eb;
        color: var(--text);
      }

      .danger {
        background: #fee2e2;
        color: var(--danger);
      }

      .danger:hover {
        background: #fecaca;
        color: var(--danger-dark);
      }

      .status {
        min-height: 1.25rem;
        margin: 0;
        font-size: 0.92rem;
        color: var(--muted);
      }

      .status.error {
        color: var(--danger);
      }

      .status.success {
        color: #15803d;
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        text-align: left;
        padding: 0.95rem 0.75rem;
        border-bottom: 1px solid var(--border);
        vertical-align: top;
      }

      th {
        font-size: 0.86rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
      }

      tbody tr:last-child td {
        border-bottom: 0;
      }

      .empty {
        text-align: center;
        color: var(--muted);
        padding: 1.5rem 0.5rem;
      }

      .muted {
        color: var(--muted);
      }

      @media (max-width: 760px) {
        .page {
          width: min(100%, calc(100% - 1rem));
          margin: 0.5rem auto;
        }

        .hero,
        .content {
          padding: 1rem;
        }

        .form-grid {
          grid-template-columns: 1fr;
        }

        th,
        td {
          min-width: 150px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="shell">
        <header class="hero">
          <h1>Contact Book</h1>
          <p>
            Manage contacts in a simple, fast, no-framework address book. Add new people,
            update existing details, and remove entries you no longer need.
          </p>
        </header>

        <div class="content">
          <section class="panel">
            <h2 id="form-title">Add Contact</h2>
            <form id="contact-form">
              <input type="hidden" id="contact-id" />
              <div class="form-grid">
                <label>
                  Name
                  <input id="name" name="name" type="text" maxlength="120" required placeholder="Ada Lovelace" />
                </label>
                <label>
                  Email
                  <input id="email" name="email" type="email" maxlength="160" placeholder="ada@example.com" />
                </label>
                <label>
                  Phone
                  <input id="phone" name="phone" type="text" maxlength="50" placeholder="123-456-7890" />
                </label>
              </div>
              <div class="actions">
                <button class="primary" id="submit-button" type="submit">Add Contact</button>
                <button class="secondary" id="cancel-button" type="button" hidden>Cancel Edit</button>
              </div>
              <p id="status" class="status" aria-live="polite"></p>
            </form>
          </section>

          <section class="panel">
            <div class="actions" style="justify-content: space-between; align-items: center; margin-bottom: 1rem;">
              <h2 style="margin: 0;">Contacts</h2>
              <button class="secondary" id="refresh-button" type="button">Refresh</button>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="contact-table-body">
                  <tr>
                    <td class="empty" colspan="4">Loading contacts…</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script>
      const form = document.getElementById('contact-form');
      const formTitle = document.getElementById('form-title');
      const contactIdInput = document.getElementById('contact-id');
      const nameInput = document.getElementById('name');
      const emailInput = document.getElementById('email');
      const phoneInput = document.getElementById('phone');
      const submitButton = document.getElementById('submit-button');
      const cancelButton = document.getElementById('cancel-button');
      const refreshButton = document.getElementById('refresh-button');
      const statusNode = document.getElementById('status');
      const tableBody = document.getElementById('contact-table-body');

      let contacts = [];
      let busy = false;

      function escapeHtml(value) {
        return String(value ?? '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function setStatus(message, tone = '') {
        statusNode.textContent = message;
        statusNode.className = `status${tone ? ` ${tone}` : ''}`;
      }

      function setBusy(nextBusy) {
        busy = nextBusy;
        submitButton.disabled = nextBusy;
        refreshButton.disabled = nextBusy;
        cancelButton.disabled = nextBusy;
      }

      function resetForm() {
        form.reset();
        contactIdInput.value = '';
        formTitle.textContent = 'Add Contact';
        submitButton.textContent = 'Add Contact';
        cancelButton.hidden = true;
        nameInput.focus();
      }

      function startEdit(contact) {
        contactIdInput.value = String(contact.id);
        nameInput.value = contact.name ?? '';
        emailInput.value = contact.email ?? '';
        phoneInput.value = contact.phone ?? '';
        formTitle.textContent = `Edit Contact #${contact.id}`;
        submitButton.textContent = 'Save Changes';
        cancelButton.hidden = false;
        setStatus(`Editing ${contact.name}.`, '');
        nameInput.focus();
      }

      function renderContacts() {
        if (contacts.length === 0) {
          tableBody.innerHTML = '<tr><td class="empty" colspan="4">No contacts yet. Add your first contact above.</td></tr>';
          return;
        }

        tableBody.innerHTML = contacts
          .map(
            (contact) => `
              <tr>
                <td>${escapeHtml(contact.name)}</td>
                <td>${contact.email ? escapeHtml(contact.email) : '<span class="muted">—</span>'}</td>
                <td>${contact.phone ? escapeHtml(contact.phone) : '<span class="muted">—</span>'}</td>
                <td>
                  <div class="row-actions">
                    <button class="secondary" type="button" data-action="edit" data-id="${contact.id}">Edit</button>
                    <button class="danger" type="button" data-action="delete" data-id="${contact.id}">Delete</button>
                  </div>
                </td>
              </tr>
            `,
          )
          .join('');
      }

      async function requestJson(url, options = {}) {
        const response = await fetch(url, options);
        const isJson = response.headers.get('content-type')?.includes('application/json');
        const data = isJson ? await response.json() : null;

        if (!response.ok) {
          throw new Error(data?.error || `Request failed with status ${response.status}`);
        }

        return data;
      }

      async function loadContacts() {
        setBusy(true);
        setStatus('Loading contacts...');

        try {
          contacts = await requestJson('/api/contacts');
          renderContacts();
          setStatus(`Loaded ${contacts.length} contact${contacts.length === 1 ? '' : 's'}.`, 'success');
        } catch (error) {
          tableBody.innerHTML = '<tr><td class="empty" colspan="4">Unable to load contacts.</td></tr>';
          setStatus(error.message || 'Unable to load contacts.', 'error');
        } finally {
          setBusy(false);
        }
      }

      async function saveContact(event) {
        event.preventDefault();
        setBusy(true);

        const id = contactIdInput.value.trim();
        const payload = {
          name: nameInput.value.trim(),
          email: emailInput.value.trim(),
          phone: phoneInput.value.trim(),
        };

        const isEditing = Boolean(id);
        const url = isEditing ? `/api/contacts/${id}` : '/api/contacts';
        const method = isEditing ? 'PUT' : 'POST';

        setStatus(isEditing ? 'Saving changes...' : 'Creating contact...');

        try {
          const saved = await requestJson(url, {
            method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });

          resetForm();
          await loadContacts();
          setStatus(
            isEditing ? `Updated ${saved.name}.` : `Added ${saved.name}.`,
            'success',
          );
        } catch (error) {
          setStatus(error.message || 'Unable to save contact.', 'error');
          setBusy(false);
        }
      }

      async function deleteContact(contact) {
        const confirmed = window.confirm(`Delete ${contact.name}?`);
        if (!confirmed) {
          return;
        }

        setBusy(true);
        setStatus(`Deleting ${contact.name}...`);

        try {
          await requestJson(`/api/contacts/${contact.id}`, { method: 'DELETE' });
          if (contactIdInput.value === String(contact.id)) {
            resetForm();
          }
          await loadContacts();
          setStatus(`Deleted ${contact.name}.`, 'success');
        } catch (error) {
          setStatus(error.message || 'Unable to delete contact.', 'error');
          setBusy(false);
        }
      }

      form.addEventListener('submit', saveContact);
      cancelButton.addEventListener('click', () => {
        resetForm();
        setStatus('Edit cancelled.');
      });
      refreshButton.addEventListener('click', loadContacts);

      tableBody.addEventListener('click', (event) => {
        const button = event.target.closest('button[data-action]');
        if (!button || busy) {
          return;
        }

        const id = Number(button.dataset.id);
        const contact = contacts.find((entry) => entry.id === id);
        if (!contact) {
          return;
        }

        if (button.dataset.action === 'edit') {
          startEdit(contact);
          return;
        }

        if (button.dataset.action === 'delete') {
          deleteContact(contact);
        }
      });

      resetForm();
      loadContacts();
    </script>
  </body>
</html>
